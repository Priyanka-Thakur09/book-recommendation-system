<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
        background:black;
    }

    /* 🔥 Animated Background */
    body::before{
        content:'';
        position:absolute;
        width:200%;
        height:200%;
        background:
            radial-gradient(circle, rgba(255,0,150,0.4), transparent 30%),
            radial-gradient(circle, rgba(0,255,255,0.4), transparent 30%),
            radial-gradient(circle, rgba(0,255,100,0.4), transparent 30%);
        animation: animateBg 15s linear infinite;
    }

    @keyframes animateBg{
        0%{
            transform:translate(-25%, -25%) rotate(0deg);
        }
        100%{
            transform:translate(-25%, -25%) rotate(360deg);
        }
    }

    /* 🔥 Glassmorphism Card */
    .login-card{
        position:relative;
        width:380px;
        padding:40px;
        border-radius:20px;

        background: rgba(255,255,255,0.08);

        border:1px solid rgba(255,255,255,0.2);

        backdrop-filter: blur(15px);

        box-shadow:0 8px 32px rgba(0,0,0,0.4);

        color:white;

        z-index:10;
    }

    .login-card h1{
        text-align:center;
        margin-bottom:30px;
        font-weight:bold;
    }

    .form-control{
        background:transparent;
        border:none;
        border-bottom:2px solid white;
        border-radius:0;
        color:white;
    }

    .form-control:focus{
        background:transparent;
        box-shadow:none;
        border-color:#00ffcc;
        color:white;
    }

    .form-control::placeholder{
        color:#ddd;
    }

    .btn-login{
        width:100%;
        border-radius:30px;
        background:white;
        color:black;
        font-weight:bold;
        transition:0.3s;
    }

    .btn-login:hover{
        background:#00ffcc;
        transform:scale(1.03);
    }

    a{
        color:#00ffcc;
        text-decoration:none;
    }

    a:hover{
        text-decoration:underline;
    }

</style>


</head>

<body>

<div class="login-card">


<h1>Login</h1>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">

    <div class="mb-4">
        <input type="email"
               name="email"
               class="form-control"
               placeholder="Enter your email"
               required>
    </div>

    <div class="mb-4">
        <input type="password"
               name="password"
               class="form-control"
               placeholder="Enter your password"
               required>
    </div>

    <button type="submit" class="btn btn-login">
        Login
    </button>

</form>

<p class="text-center mt-4">
    Don't have an account?
    <a href="/signup">Register</a>
</p>


</div>

</body>
</html>
