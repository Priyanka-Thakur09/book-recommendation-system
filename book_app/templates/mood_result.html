<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>{{ mood }} Books</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <nav class="navbar navbar-expand-lg">

        <div class="container-fluid">

            <a class="navbar-brand" href="/">
                📚 My Book Recommender
            </a>

            <ul class="navbar-nav ms-auto d-flex flex-row">

                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/recommend">Recommend</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/moods">Moods</a>
                </li>

            </ul>

        </div>

    </nav>

    <div class="container">

        <h1 class="page-title">
            {{ mood }} Books
        </h1>

        <p class="page-subtitle">
            Recommended books for your current mood
        </p>
        {% if error %}

        <div class="error-box">

            <h3>{{ error }}</h3>

        </div>

        {% endif %}

        <div class="row g-4">

            {% for book in books %}

            <div class="col-lg-3 col-md-4 col-sm-6">

                <div class="glass-card">

                    <img src="{{ book.image }}"
                    class="book-img">

                    <div class="card-body">

                        <h3 class="book-title">
                            {{ book.title }}
                        </h3>

                        <p class="book-author">
                            {{ book.author }}
                        </p>

                        <p class="mt-3 text-light">
                            {{ book.description }}
                        </p>

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
